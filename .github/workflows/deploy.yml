name: Build and Deploy Teaming Engine

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/taskrit-teaming
  CONTAINER_NAME: taskrit-teaming
  CONTAINER_PORT: 3002
  VOLUME_DB: taskrit-teaming-db
  VOLUME_QDRANT: taskrit-teaming-qdrant

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.GEMINI_API }}" ]; then
            echo "::error::Missing required secret: GEMINI_API"
            exit 1
          fi
          if [ -z "${{ secrets.HMAC_KEY }}" ]; then
            echo "::error::Missing required secret: HMAC_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing required secret: SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          timeout 15s ssh-keyscan -T 5 -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -e
            echo "Logging into GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "Pulling latest image..."
            docker pull "${{ env.IMAGE_NAME }}:latest"

            echo "Stopping old container..."
            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true

            echo "Ensuring docker network exists..."
            docker network create "taskrit-network" || true

            echo "Starting new container..."
            # Create host directories for persistence
            mkdir -p ~/taskrit_data/teaming/qdrant_data
            mkdir -p ~/taskrit_data/teaming/db
            
            # Start container
            # Mapping ~/taskrit_data/teaming/db -> /app/db
            # Mapping ~/taskrit_data/teaming/qdrant_data -> /app/qdrant_data
            # DATABASE_URL uses /app/db/taskrit.db
            
            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --network "taskrit-network" \
              --restart unless-stopped \
              -p 3002:3002 \
              -e GEMINI_API="${{ secrets.GEMINI_API }}" \
              -e HMAC_KEY="${{ secrets.HMAC_KEY }}" \
              -e DATABASE_URL="sqlite+aiosqlite:///./db/taskrit.db" \
              -v ~/taskrit_data/teaming/db:/app/db \
              -v ~/taskrit_data/teaming/qdrant_data:/app/qdrant_data \
              "${{ env.IMAGE_NAME }}:latest"
            
            echo "Deployment successful!"
          EOF
